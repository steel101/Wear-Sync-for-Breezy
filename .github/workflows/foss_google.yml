name: Build FOSS & Google Play APKs

on:
  workflow_dispatch: # This ensures it ONLY runs when manually clicked

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest
    # This ensures the job only runs if triggered from 'main' OR 'testing'
    if: github.ref_name == 'main' || github.ref_name == 'testing'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Required Build Tools for Signing
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - name: Extract Version Name from Gradle
        id: get_version
        run: |
          VERSION_NAME=$(grep -m 1 "versionName" app/build.gradle* | tr -d '[:space:]' | cut -d'"' -f2 | cut -d"'" -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Build Watch APKs First
        run: ./gradlew :wear:assembleFossRelease :wear:assembleGooglePlayRelease

      - name: Sign Watch FOSS APK
        id: sign_watch_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Watch Google Play APK
        id: sign_watch_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare Assets for Phone Build
        run: |
          mkdir -p app/src/googlePlay/assets
          cp ${{ steps.sign_watch_google.outputs.signedReleaseFile }} app/src/googlePlay/assets/wear_companion.apk
          mkdir -p app/src/foss/assets
          cp ${{ steps.sign_watch_foss.outputs.signedReleaseFile }} app/src/foss/assets/wear_companion.apk

      - name: Build Phone APKs
        run: ./gradlew :app:assembleFossRelease :app:assembleGooglePlayRelease

      - name: Sign Phone FOSS APK
        id: sign_phone_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Phone Google Play APK
        id: sign_phone_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name == 'main' && 'Release Build v' || 'Testing Build v' }}${{ steps.get_version.outputs.VERSION_NAME }}
          tag_name: Release-Build-v${{ steps.get_version.outputs.VERSION_NAME }}
          target_commitish: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
          files: |
            ${{ steps.sign_phone_foss.outputs.signedReleaseFile }}
            ${{ steps.sign_phone_google.outputs.signedReleaseFile }}
            ${{ steps.sign_watch_foss.outputs.signedReleaseFile }}
            ${{ steps.sign_watch_google.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
