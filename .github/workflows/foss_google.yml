name: Build FOSS & Google Play APKs

on:
  workflow_dispatch: # This ensures it ONLY runs when manually clicked

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'testing'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Required Build Tools for Signing
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - name: Extract Version Name from Gradle
        id: get_version
        run: |
          VERSION_NAME=$(grep -m 1 "versionName" app/build.gradle* | tr -d '[:space:]' | cut -d'"' -f2 | cut -d"'" -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Make Gradle Executable
        run: chmod +x ./gradlew


      # ==================== GOOGLE PLAY PIPELINE ====================

      # 1. Build the Google Play Watch App
      - name: Build Google Play Watch APK
        run: ./gradlew :wear:assembleGooglePlayRelease

      # 2. Sign the Google Play Watch APK right away
      - name: Sign Watch Google Play APK
        id: sign_watch_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 3. Copy that explicitly SIGNED Google Play Watch App into Phone Assets
      - name: Prepare Assets for Google Play Phone Build
        run: |
          mkdir -p app/src/googlePlay/assets
          cp ${{ steps.sign_watch_google.outputs.signedReleaseFile }} app/src/googlePlay/assets/wear_companion.apk

      # 4. Build the Google Play Phone App
      - name: Build Google Play Phone APK
        run: ./gradlew :app:assembleGooglePlayRelease

      # 5. Sign the Google Play Phone App (Both match perfectly now)
      - name: Sign Phone Google Play APK
        id: sign_phone_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}


      # ==================== FOSS PIPELINE ====================

      # 6. Build the FOSS Watch App
      - name: Build FOSS Watch APK
        run: ./gradlew :wear:assembleFossRelease

      # 7. Embed the UNSIGNED FOSS Watch APK directly into the Phone Assets
      - name: Prepare Assets for FOSS Phone Build
        run: |
          mkdir -p app/src/foss/assets
          cp wear/build/outputs/apk/foss/release/wear-foss-release-unsigned.apk app/src/foss/assets/wear_companion.apk

      # 8. Build the FOSS Phone App
      - name: Build FOSS Phone APK
        run: ./gradlew :app:assembleFossRelease

      # 9. Sign ONLY the FOSS Phone App (FOSS Watch stays unsigned)
      - name: Sign Phone FOSS APK
        id: sign_phone_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}


      # ==================== PUBLIC RELEASE ASSETS ====================

      # 10. Clean up public loose FOSS watch file name for easier visibility
      - name: Prepare Public FOSS Watch Release Name
        run: |
          cp wear/build/outputs/apk/foss/release/wear-foss-release-unsigned.apk wear/build/outputs/apk/foss/release/Wear-FOSS-Release.apk

      # 11. Publish with clean semantic versions for IzzyOnDroid compatibility
      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name == 'main' && 'Release ' || 'Testing Release ' }}v${{ steps.get_version.outputs.VERSION_NAME }}
          tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
          target_commitish: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
          files: |
            ${{ steps.sign_phone_foss.outputs.signedReleaseFile }}
            ${{ steps.sign_phone_google.outputs.signedReleaseFile }}
            wear/build/outputs/apk/foss/release/Wear-FOSS-Release.apk
            ${{ steps.sign_watch_google.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
