name: Build FOSS & Google Play APKs

on:
  workflow_dispatch: # This ensures it ONLY runs when manually clicked

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest
    # This ensures the job only runs if triggered from 'main' OR 'testing'
    if: github.ref_name == 'main' || github.ref_name == 'testing'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Floss App Version Name
        id: get_version
        run: |
          # Use grep to find the file containing versionName, then use sed to strictly grab what is inside the quotes after 'versionName ='
          VERSION_NAME=$(grep "versionName" app/build.gradle* | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          
          # Safety fallback just in case the file reading fails
          if [ -z "$VERSION_NAME" ] || [ "$VERSION_NAME" == "defaultConfig {" ]; then
            VERSION_NAME="1.0.55-fallback"
          fi
          
          echo "Extracted App Version: $VERSION_NAME"
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Android Build Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;35.0.0" "platforms;android-35"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Build and Sign Watch APKs First
        run: ./gradlew :wear:assembleFossRelease :wear:assembleGooglePlayRelease

      - name: Sign Watch FOSS APK
        id: sign_watch_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Watch Google Play APK
        id: sign_watch_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare Assets for Phone Build
        run: |
          # Only prepare and copy assets for the Google Play flavor
          mkdir -p app/src/googlePlay/assets
          cp "${{ steps.sign_watch_google.outputs.signedReleaseFile }}" app/src/googlePlay/assets/wear_companion.apk

      - name: Build Phone APKs
        run: ./gradlew :app:assembleFossRelease :app:assembleGooglePlayRelease

      - name: Sign Phone FOSS APK
        id: sign_phone_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Phone Google Play APK
        id: sign_phone_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename and Organize Artifacts
        run: |
          mkdir -p output_apks
          cp "${{ steps.sign_phone_foss.outputs.signedReleaseFile }}" output_apks/floss-phone.apk
          cp "${{ steps.sign_phone_google.outputs.signedReleaseFile }}" output_apks/google-phone.apk
          cp "${{ steps.sign_watch_foss.outputs.signedReleaseFile }}" output_apks/floss-watch.apk
          cp "${{ steps.sign_watch_google.outputs.signedReleaseFile }}" output_apks/google-watch.apk

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          # This sets the clean, human-readable headline on the release page
          name: ${{ github.ref_name == 'main' && 'Release Build' || 'FOSS & Google Play Testing Release' }} v${{ steps.get_version.outputs.version }}
          # This forces the tag name to exactly match your desired "Release Build v1.0.xx" format using Git-safe hyphens
          tag_name: ${{ github.ref_name == 'main' && 'Release-Build' || 'Testing-Build' }}-v${{ steps.get_version.outputs.version }}
          target_commitish: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
          files: |
            output_apks/floss-phone.apk
            output_apks/google-phone.apk
            output_apks/floss-watch.apk
            output_apks/google-watch.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
