name: Build FOSS & Google Play APKs

on:
  workflow_dispatch: # This ensures it ONLY runs when manually clicked

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'testing'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Required Build Tools for Signing
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - name: Extract Version Name from Gradle
        id: get_version
        run: |
          VERSION_NAME=$(grep -m 1 "versionName" app/build.gradle* | tr -d '[:space:]' | cut -d'"' -f2 | cut -d"'" -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # 1. Compile all variants simultaneously natively from source code
      - name: Build All Variants
        run: ./gradlew :wear:assembleFossRelease :wear:assembleGooglePlayRelease :app:assembleFossRelease :app:assembleGooglePlayRelease

      # 2. Sign Watch Apps
      - name: Sign Watch FOSS APK
        id: sign_watch_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Watch Google Play APK
        id: sign_watch_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: wear/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 3. Sign Phone Apps
      - name: Sign Phone FOSS APK
        id: sign_phone_foss
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign Phone Google Play APK
        id: sign_phone_google
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/googlePlay/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 4. Clean up filenames for clean public display and to match your app's download URL
      - name: Prepare Clean Public Release Names
        run: |
          # Rename Phone APKs
          cp app/build/outputs/apk/foss/release/app-foss-release-signed.apk app/build/outputs/apk/foss/release/floss-phone.apk
          cp app/build/outputs/apk/googlePlay/release/app-googlePlay-release-signed.apk app/build/outputs/apk/googlePlay/release/google-phone.apk
          
          # Rename Watch APKs
          cp wear/build/outputs/apk/foss/release/wear-foss-release-signed.apk wear/build/outputs/apk/foss/release/floss-watch.apk
          cp wear/build/outputs/apk/googlePlay/release/wear-googlePlay-release-signed.apk wear/build/outputs/apk/googlePlay/release/google-watch.apk

      # 5. Publish with clean semantic versions for IzzyOnDroid compatibility
      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name == 'main' && 'Release ' || 'Testing Release ' }}v${{ steps.get_version.outputs.VERSION_NAME }}
          tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
          target_commitish: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
          files: |
            app/build/outputs/apk/foss/release/floss-phone.apk
            app/build/outputs/apk/googlePlay/release/google-phone.apk
            wear/build/outputs/apk/foss/release/floss-watch.apk
            wear/build/outputs/apk/googlePlay/release/google-watch.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
